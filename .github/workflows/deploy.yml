name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: self-hosted

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Ansible Deployment
        run: |

           /usr/local/bin/ansible-playbook \
            -i inventory/hosts.ini \
            playbooks/deploy.yml
